# Netlify configuration — Midwest Waste concept preview
# One-click deploy: connect this repo in Netlify and it'll just work.

[build]
  edge_functions = "netlify/edge-functions"
  # No build command — this is a plain static site.

# Password gate — runs on every request before static file serving.
[[edge_functions]]
  function = "gate"
  path = "/*"

# Sensible defaults for a static marketing site
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# Long cache for immutable assets (images, fonts)
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/character-studies/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/game/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
